name: Update versions

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest versions
        run: |
          ZLIB=$(curl -s https://zlib.net/ \
            | grep -o 'zlib-[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?\.tar\.gz' \
            | sed 's/zlib-//; s/\.tar\.gz//' \
            | sort -V | tail -n 1)
          OPENSSL=$(git ls-remote --tags https://github.com/openssl/openssl \
            | awk -F/ '/[0-9]$/  && /openssl-/ && ! /-[a-z]/ {gsub("openssl-", ""); print $3}' \
            | sort -V | grep -Ev '^4' | tail -1)
          VALKEY=$(git ls-remote --tags https://github.com/valkey-io/valkey \
            | awk -F/ '{print $3}' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)

          set -u
          yq -i ".zlib= \"$ZLIB\"" versions.yaml
          yq -i ".openssl= \"$OPENSSL\"" versions.yaml
          yq -i ".valkey= \"$VALKEY\"" versions.yaml
          git diff versions.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-versions
          delete-branch: true
          title: Update versions
          commit-message: Update versions
