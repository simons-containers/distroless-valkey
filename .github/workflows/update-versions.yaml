name: Update versions

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Fetch latest versions
        uses: nick-fields/retry@v4
        with:
          max_attempts: 5
          timeout_minutes: 10
          command: |
            set -uo pipefail
            ZLIB=$(git ls-remote --tags https://github.com/madler/zlib \
              | awk -F/ '!/\^/ {gsub("v",""); print $3}' \
              | sort -V | tail -1)
            OPENSSL=$(git ls-remote --tags https://github.com/openssl/openssl \
              | awk -F/ '/[0-9]$/  && /openssl-/ && ! /-[a-z]/ {gsub("openssl-", ""); print $3}' \
              | sort -V | grep -Ev '^4' | tail -1)
            VALKEY=$(git ls-remote --tags https://github.com/valkey-io/valkey \
              | awk -F/ '{print $3}' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V | tail -1)

            : ${ZLIB:?} ${OPENSSL:?} ${VALKEY:?}
  
            jq \
              --arg valkey "$VALKEY" \
              --arg zlib "$ZLIB" \
              --arg openssl "$OPENSSL" \
              '
                .valkey.version = $valkey |
                .zlib.version = $zlib |
                .openssl.version = $openssl
              ' sources.json > tmp.json && mv tmp.json sources.json

            git diff sources.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-versions
          delete-branch: true
          title: Update versions
          commit-message: Update versions
